# Sequential SFT+DPO (C4) — DPO on top of an existing SFT adapter.
#
# Methodologically: this is the controlled real-world-reference condition.
# C3 (DPO from base) vs. C4 (DPO from SFT) isolates how much of the alignment-
# driven cultural drift requires SFT preconditioning. Same HH-RLHF data, same
# seed, same hyperparameters as C3 — only the starting weights differ.
#
# Hyperparameters mirror finetune/configs/dpo_config.yaml exactly. The only
# additions are `model_name_or_path` (base, before SFT merge) and
# `init_adapter_path` (the SFT checkpoint to merge in before DPO).
#
# NB: no `quantization:` block. merge_and_unload() doesn't compose with 4-bit
# cleanly, so this script loads in bf16. See finetune/sftdpo_train.py docstring.

model_name_or_path: meta-llama/Llama-3.2-3B
init_adapter_path: checkpoints/sft    # parent dir — script auto-picks the highest-numbered checkpoint-N subdir

dataset_name: Anthropic/hh-rlhf
dataset_path: data/hh-rlhf
output_dir: checkpoints/sftdpo

# Same subsample as C3 — both DPO conditions see identical training data.
max_train_examples: 30000

# Training
num_train_epochs: 2
per_device_train_batch_size: 2
gradient_accumulation_steps: 16   # effective batch = 32
learning_rate: 5.0e-5
warmup_ratio: 0.1
lr_scheduler_type: cosine
weight_decay: 0.0
max_grad_norm: 1.0
optim: paged_adamw_8bit
max_length: 512
max_prompt_length: 256

# DPO-specific
beta: 0.1
loss_type: sigmoid

# Saving
save_strategy: epoch
save_total_limit: 2
logging_steps: 25
report_to: none
seed: 42

# Reward-margin early stop (same patience as C3)
early_stop:
  enabled: true
  patience_windows: 4

# LoRA — fresh adapter applied on top of merged SFT weights.
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
