# SFT on Alpaca for Gemma 4 12B (C2 at gemma4).
#
# Mirrors sft_8b_config.yaml with:
#   1. base model → google/gemma-4-12B
#   2. output_dir → checkpoints/sft_gemma4
#   3. per-device batch reduced to 1 and grad-accum to 32 to stay within
#      A6000 48 GB: 12B bf16 ≈ 24 GB weights; batch=1 leaves enough headroom
#      for activations + LoRA optimizer state.
# Loads in bf16 to match dpo/sftdpo precision.

model_name_or_path: google/gemma-4-12B
dataset_name: tatsu-lab/alpaca
dataset_path: data/alpaca
output_dir: checkpoints/sft_gemma4

# Training
num_train_epochs: 3
per_device_train_batch_size: 1     # reduced from 8B for 12B memory headroom
gradient_accumulation_steps: 32    # effective batch = 32
learning_rate: 2.0e-4
warmup_ratio: 0.03
lr_scheduler_type: cosine
weight_decay: 0.0
max_grad_norm: 1.0
optim: paged_adamw_8bit
max_seq_length: 512

# Saving
save_strategy: epoch
save_total_limit: 3
logging_steps: 25
report_to: none
seed: 42

# LoRA (same recipe as 3B/8B; same module names as Llama 3)
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
