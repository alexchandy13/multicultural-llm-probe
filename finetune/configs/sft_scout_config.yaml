# SFT on Alpaca for Llama-4-Scout-17B-16E (C2 at Scout scale).
#
# Llama 4 Scout is a 109B-parameter MoE model (17B active / 16 experts).
# Key differences from the 3B/8B configs:
#   1. base model set to meta-llama/Llama-4-Scout-17B-16E
#   2. output_dir suffixed _scout so checkpoints coexist with 3B/8B
#   3. per-device batch = 1, grad-accum = 32 to keep effective batch = 32
#      while fitting within multi-GPU VRAM budget
#   4. max_seq_length reduced to 512 (same as 3B) — Scout supports 10M context
#      but SFT examples are short; keep the token budget tight
#   5. LoRA targets attention-only (q/k/v/o_proj); MoE expert FFN layers
#      (feed_forward.experts.{i}.w1/w2/w3) are left frozen by default to
#      avoid multiplying trainable params by 16 × number of MoE layers.
#      Add them to target_modules if you want to tune the expert FFN.
#
# Memory estimate (4-bit NF4, 4× RTX A5000 24 GB = 96 GB):
#   109B params @ 4-bit ≈ 54 GB weights
#   LoRA params (attn only, r=32) ≈ <1 GB
#   Activations + bf16 compute ≈ 10–15 GB
#   Total ≈ 65–70 GB → fits 4× A5000 with headroom
#
# transformers >= 4.51.0 required for Llama 4 support.

model_name_or_path: meta-llama/Llama-4-Scout-17B-16E
dataset_name: tatsu-lab/alpaca
dataset_path: data/alpaca
output_dir: checkpoints/sft_scout

# Training
num_train_epochs: 3
per_device_train_batch_size: 1      # 1 per GPU; 4 GPUs → effective = 32 with accum
gradient_accumulation_steps: 32
learning_rate: 2.0e-4
warmup_ratio: 0.03
lr_scheduler_type: cosine
weight_decay: 0.0
max_grad_norm: 1.0
optim: paged_adamw_8bit
max_seq_length: 512

# Saving
save_strategy: epoch
save_total_limit: 3
logging_steps: 25
report_to: none
seed: 42

# Quantization (4-bit NF4 + double quant + bf16 compute)
quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: bfloat16

# LoRA — attention-only targets; see note above re: MoE expert FFN
lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
