# C4 Scout — DPO on top of the Alpaca SFT adapter for Llama-4-Scout-17B-16E.
#
# For 3B/8B models the SFT+DPO pipeline uses merge_and_unload() to bake the SFT
# LoRA into the base before DPO training. That approach is infeasible at Scout
# scale because loading 109B params in bf16 requires ~218 GB VRAM.
#
# Instead, this config uses PEFT adapter stacking (--stack-adapters flag in
# sftdpo_train.py): the SFT LoRA adapter is attached and frozen, then a fresh
# DPO LoRA adapter is added on top. With ref_model=None, DPOTrainer uses the
# adapter-disabled base as the reference — consistent with how the 3B version
# uses the merged base as reference. Memory budget remains the same as C3 Scout
# because we do not materialize a merged model.
#
# Pass --stack-adapters to sftdpo_train.py to activate this path.

model_name_or_path: meta-llama/Llama-4-Scout-17B-16E
init_adapter_path: checkpoints/sft_scout  # parent dir; script picks highest checkpoint-N

dataset_name: Anthropic/hh-rlhf
dataset_path: data/hh-rlhf
output_dir: checkpoints/sftdpo_scout

max_train_examples: 30000

# Training (mirrors dpo_scout_config.yaml)
num_train_epochs: 2
per_device_train_batch_size: 1
gradient_accumulation_steps: 32
learning_rate: 5.0e-5
warmup_ratio: 0.1
lr_scheduler_type: cosine
weight_decay: 0.0
max_grad_norm: 1.0
optim: paged_adamw_8bit
max_length: 512
max_prompt_length: 256

# DPO-specific
beta: 0.1
loss_type: sigmoid

# Saving
save_strategy: epoch
save_total_limit: 2
logging_steps: 25
report_to: none
seed: 42

early_stop:
  enabled: true
  patience_windows: 4

# Quantization — 4-bit (adapter stacking avoids the merge_and_unload() bf16 constraint)
quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: bfloat16

# LoRA for the DPO adapter (same targets as SFT Scout adapter)
lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
