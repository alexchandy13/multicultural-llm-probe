# SFT on LIMA (C2b) — second robustness variant.
#
# LIMA (Zhou et al. 2023, arxiv:2305.11206) is a 1,000-example carefully-curated
# instruction-tuning dataset designed to demonstrate "Less Is More for Alignment."
# Original paper used LLaMA 65B + 15 epochs; we use the smaller Llama 3.2 3B and
# bump epochs to compensate for the tiny dataset.
#
# Identical hyperparameters to sft_alpaca_config.yaml except:
#   - dataset_name / dataset_path / output_dir
#   - num_train_epochs (15 instead of 3, matching the LIMA paper's recipe to
#     give the 1000-example set sufficient training signal)
#   - max_seq_length stays at 512; most LIMA prompts fit within this.
#
# Both Alpaca and LIMA SFT use the same trainer code path —
# finetune/sft_train.py picks the right loader from `dataset_name`.

model_name_or_path: meta-llama/Llama-3.2-3B
dataset_name: GAIR/lima
dataset_path: data/lima
output_dir: checkpoints/sft_lima

# LIMA paper trained 15 epochs because the dataset is small. Matches the
# original recipe and gives the LoRA enough updates to leave a measurable
# imprint on the weights (~470 optimizer steps at effective batch 32).
num_train_epochs: 15

per_device_train_batch_size: 4
gradient_accumulation_steps: 8  # effective batch = 32
learning_rate: 2.0e-4
warmup_ratio: 0.03
lr_scheduler_type: cosine
weight_decay: 0.0
max_grad_norm: 1.0
optim: paged_adamw_8bit
max_seq_length: 512

# Saving
save_strategy: epoch
save_total_limit: 3
logging_steps: 25
report_to: none
seed: 42

# Quantization (identical to other SFT runs)
quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: bfloat16

# LoRA (identical recipe)
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
