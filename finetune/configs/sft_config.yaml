# SFT on Alpaca (C2a) — robustness variant.
#
# This config exists primarily for documentation and reproducibility. The
# Alpaca SFT checkpoint at `checkpoints/sft/` was trained from a prior
# run (transferred from a local machine); this YAML records the exact recipe
# so the run can be reproduced later if needed.
#
# Identical to sft_config.yaml except dataset and output_dir. Both Alpaca and
# HH-RLHF SFT use the same hyperparameters and trainer code path —
# finetune/sft_train.py picks the right loader from `dataset_name`.

model_name_or_path: meta-llama/Llama-3.2-3B
dataset_name: tatsu-lab/alpaca
dataset_path: data/alpaca
output_dir: checkpoints/sft_3b

# Alpaca is ~52k instruction-response pairs. No subsampling — full dataset
# (matching the original plan's spec for C2a-style runs). If you want to cap
# for SLURM time reasons, add `max_train_examples: N` here; the loader honors it.

# Training
num_train_epochs: 3
per_device_train_batch_size: 4
gradient_accumulation_steps: 8  # effective batch = 32
learning_rate: 2.0e-4
warmup_ratio: 0.03
lr_scheduler_type: cosine
weight_decay: 0.0
max_grad_norm: 1.0
optim: paged_adamw_8bit
max_seq_length: 512

# Saving
save_strategy: epoch
save_total_limit: 3
logging_steps: 25
report_to: none
seed: 42

# Quantization (4-bit NF4 + double quant + bf16 compute) — same as primary SFT
quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: bfloat16

# LoRA — same recipe as primary SFT
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
