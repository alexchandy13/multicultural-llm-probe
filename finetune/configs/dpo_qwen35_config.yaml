# DPO config for Qwen3.5 9B Base — shared hyperparameters.
# dataset_name, dataset_path, and output_dir are passed via CLI at submission time.
# See slurm/dpo_qwen35_coig_job.sh and slurm/dpo_qwen35_pku_job.sh.

model_name_or_path: Qwen/Qwen3.5-9B-Base

max_train_examples: 30000

# Training
num_train_epochs: 2
per_device_train_batch_size: 1
gradient_accumulation_steps: 32
learning_rate: 5.0e-5
warmup_ratio: 0.1
lr_scheduler_type: cosine
weight_decay: 0.0
max_grad_norm: 1.0
optim: paged_adamw_8bit
max_length: 512
max_prompt_length: 256

# DPO-specific
beta: 0.1
loss_type: sigmoid

# Saving
save_strategy: epoch
save_total_limit: 2
logging_steps: 25
report_to: none
seed: 42

# Reward-margin early stop
early_stop:
  enabled: true
  patience_windows: 4

# LoRA
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
