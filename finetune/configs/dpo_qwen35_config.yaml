# DPO on HH-RLHF for Qwen3.5 9B Base (C3 at qwen35).
#
# Mirrors dpo_8b_config.yaml with:
#   1. base model → Qwen/Qwen3.5-9B-Base
#   2. output_dir → checkpoints/dpo_qwen35
# Loads in bf16 to match sftdpo_qwen35 precision.

model_name_or_path: Qwen/Qwen3.5-9B-Base
dataset_name: Anthropic/hh-rlhf
dataset_path: data/hh-rlhf
output_dir: checkpoints/dpo_qwen35

# Same HH-RLHF subsample as 3B/8B/gemma4 runs.
max_train_examples: 30000

# Training
num_train_epochs: 2
per_device_train_batch_size: 1
gradient_accumulation_steps: 32
learning_rate: 5.0e-5
warmup_ratio: 0.1
lr_scheduler_type: cosine
weight_decay: 0.0
max_grad_norm: 1.0
optim: paged_adamw_8bit
max_length: 512
max_prompt_length: 256

# DPO-specific
beta: 0.1
loss_type: sigmoid

# Saving
save_strategy: epoch
save_total_limit: 2
logging_steps: 25
report_to: none
seed: 42

# Reward-margin early stop (same patience as 3B/8B/gemma4)
early_stop:
  enabled: true
  patience_windows: 4

# LoRA (same recipe as 3B/8B/gemma4)
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
