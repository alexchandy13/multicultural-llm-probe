# DPO on HH-RLHF for Llama-4-Scout-17B-16E (C3 at Scout scale).
#
# Same design as dpo_config.yaml but adapted for Scout's MoE size.
# See sft_scout_config.yaml header for memory budget and LoRA target rationale.
#
# DPO is more memory-hungry than SFT because TRL evaluates both the policy
# and a frozen reference (or uses the LoRA-disabled base as ref when
# ref_model=None). With ref_model=None the extra cost is just a second forward
# pass through the base weights, which are already loaded in 4-bit.

model_name_or_path: meta-llama/Llama-4-Scout-17B-16E
dataset_name: Anthropic/hh-rlhf
dataset_path: data/hh-rlhf
output_dir: checkpoints/dpo_scout

# Same subsample as C3 3B for cross-scale comparability.
max_train_examples: 30000

# Training
num_train_epochs: 2
per_device_train_batch_size: 1
gradient_accumulation_steps: 32    # effective batch = 32 across 4 GPUs (1 per GPU)
learning_rate: 5.0e-5
warmup_ratio: 0.1
lr_scheduler_type: cosine
weight_decay: 0.0
max_grad_norm: 1.0
optim: paged_adamw_8bit
max_length: 512
max_prompt_length: 256

# DPO-specific
beta: 0.1
loss_type: sigmoid

# Saving
save_strategy: epoch
save_total_limit: 2
logging_steps: 25
report_to: none
seed: 42

early_stop:
  enabled: true
  patience_windows: 4

# Quantization (same as SFT Scout)
quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: bfloat16

# LoRA — attention-only; see sft_scout_config.yaml for rationale
lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
