# C4 at gemma4 — DPO on top of the merged Alpaca SFT adapter, on Gemma 4 12B.
#
# Mirrors sftdpo_8b_config.yaml with:
#   1. base model → google/gemma-4-12B
#   2. init_adapter_path → checkpoints/sft_gemma4
#   3. output_dir → checkpoints/sftdpo_gemma4
#   4. max_length/max_prompt_length reduced to fit merged 12B bf16 + activations
#      within A6000 48 GB (merged base ≈ 24 GB; shorter seqs keep peak low).

model_name_or_path: google/gemma-4-12B
init_adapter_path: checkpoints/sft_gemma4

dataset_name: Anthropic/hh-rlhf
dataset_path: data/hh-rlhf
output_dir: checkpoints/sftdpo_gemma4

# Same HH-RLHF subsample as 3B/8B and dpo_gemma4.
max_train_examples: 30000

# Training
num_train_epochs: 2
per_device_train_batch_size: 1
gradient_accumulation_steps: 32
learning_rate: 5.0e-5
warmup_ratio: 0.1
lr_scheduler_type: cosine
weight_decay: 0.0
max_grad_norm: 1.0
optim: paged_adamw_8bit
max_length: 320
max_prompt_length: 160

# DPO-specific
beta: 0.1
loss_type: sigmoid

# Saving
save_strategy: epoch
save_total_limit: 2
logging_steps: 25
report_to: none
seed: 42

# Reward-margin early stop (same patience as 3B/8B)
early_stop:
  enabled: true
  patience_windows: 4

# LoRA — fresh adapter on top of merged gemma4 SFT weights.
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
